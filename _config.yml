lang: en
timezone: America/Los_Angeles

title: William Forney
tagline: have code, will travel
description: >-
  Personal blog of William Forney — software engineer, architect, and developer.
  Writing about .NET, cloud, architecture, and more.

url: "https://wforney.github.io"
baseurl: ""

theme: jekyll-theme-chirpy

github:
  username: wforney

twitter:
  username: wforney

linkedin:
  username: wforney

instagram:
  username: billforney

facebook:
  username: wforney

tiktok:
  username: billforney

social:
  name: William Forney
  email: blog@williamforney.com
  links:
    - https://www.linkedin.com/in/wforney
    - https://github.com/wforney
    - https://twitter.com/wforney
    - https://www.instagram.com/billforney
    - https://www.facebook.com/wforney
    - https://tiktok.com/@billforney
    - https://app.maven.co/join/DsYfuhyr
    - https://orcid.org/0009-0009-2178-0580
    - https://williamforney.com
    - https://www.improvgroup.com/
    - https://www.nuget.org/profiles/wforney

theme_mode: dark

avatar: "https://0.gravatar.com/avatar/f4c1d4d37afad2272d15ca67555270e5?s=320"

toc: true

# Syntax highlighting
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Permalink matches original WordPress URL structure
permalink: /:year/:month/:day/:title/

paginate: 10
paginate_path: "/page:num/"

# Exclude from build
exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
  - "*.sh"
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - scrape_blog.py
  - cleanup_posts.py
  - download_images.py
  - recover_images.py
